name: Trigger AI Agent on feature-ready-for-ai

on:
  issues:
    types: [labeled]

jobs:
  handoff-to-ai-agent:
    if: github.event.label.name == 'feature-ready-for-ai'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Swap labels (ready → in-progress)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['ai-in-progress']
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              name: 'feature-ready-for-ai'
            });

      - name: Check Copilot assignability
        id: copilot-check
        uses: actions/github-script@v7
        with:
          script: |
            const assignee = 'Copilot';
            const issueNumber = context.payload.issue.number;

            try {
              await github.rest.issues.checkUserCanBeAssigned({
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignee
              });
              core.setOutput('assignable', 'true');
              core.setOutput('assignee', assignee);
            } catch (e) {
              core.setOutput('assignable', 'false');
              core.setOutput('assignee', assignee);
              core.setOutput('reason', e.message || 'Unknown error while checking assignee.');
              core.setOutput('issueNumber', String(issueNumber));
            }

      - name: Assign to Copilot and post handoff comment
        if: steps.copilot-check.outputs.assignable == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const assignee = `${{ steps.copilot-check.outputs.assignee }}`;

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: [assignee]
            });

            // Post handoff comment triggering Copilot
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '## 🤖 AI Agent Handoff — Checkpoint A Complete',
                '',
                '@Copilot Please implement this issue using `.github/prompts/issue-to-pr.prompt.md` as your guide.',
                '',
                'The issue body contains the complete plan including:',
                '- Current behavior',
                '- Affected layers',
                '- End-to-end flow',
                '- Test coverage requirements',
                '- Assumptions and risks',
                '',
                '**Do not ask for clarification unless a requirement is truly ambiguous and blocks progress.**',
                '',
                '_Label `ai-in-progress` applied. Developer will review the PR at Checkpoint B._'
              ].join('\n')
            });

      - name: Comment diagnostics and fail if Copilot is not assignable
        if: steps.copilot-check.outputs.assignable != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const assignee = `${{ steps.copilot-check.outputs.assignee }}`;
            const reason = `${{ steps.copilot-check.outputs.reason }}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '## ⚠️ AI Agent Handoff Failed',
                '',
                `The workflow could not assign this issue to **${assignee}**.`,
                '',
                `GitHub API response: ${reason}`,
                '',
                '### How to fix',
                '1. Verify GitHub Copilot coding agent issue assignment is enabled for this repository/organization.',
                '2. Confirm the Copilot assignee login configured in this workflow is valid and assignable in this repo.',
                '3. Run this check locally: `gh api repos/${context.repo.owner}/${context.repo.repo}/assignees/${assignee}`.',
                '4. Re-apply the `feature-ready-for-ai` label after fixing configuration.',
                '',
                '_This workflow intentionally failed to make the handoff problem visible._'
              ].join('\n')
            });

            core.setFailed(`Copilot is not assignable in ${context.repo.owner}/${context.repo.repo}.`);
