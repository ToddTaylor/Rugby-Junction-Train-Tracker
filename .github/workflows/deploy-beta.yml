name: Deploy BETA

on:
  workflow_dispatch:
  push:
    branches:
      - beta
    paths:
      - "Web/**"
      - ".github/workflows/deploy-beta.yml"

permissions:
  contents: read

env:
  DOTNET_VERSION: 8.0.x
  NODE_VERSION: 20.x
  WEB_PROJECT: Web/Web.Server/Web.Server.csproj
  BETA_PUBLISH_PROFILE: Web/Web.Server/Properties/PublishProfiles/BETA.pubxml

jobs:
  build-and-deploy:
    runs-on: windows-latest
    environment: beta

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: beta

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Add Mailtrap GitHub Packages source
        shell: pwsh
        run: |
          dotnet nuget remove source mailtrap-gpr 2>$null
          dotnet nuget add source "https://nuget.pkg.github.com/mailtrap/index.json" --name "mailtrap-gpr" --username "${{ vars.MAILTRAP_GH_USERNAME }}" --password "${{ secrets.MAILTRAP_GH_PAT }}" --store-password-in-clear-text

      - name: Patch appsettings.Beta.json
        shell: pwsh
        run: |
          $path = "Web/Web.Server/appsettings.Beta.json"
          $json = Get-Content $path | ConvertFrom-Json
          $json.ApplicationSettings.ApiKey = "${{ vars.API_KEY }}"
          $json.Mailtrap.ApiToken = "${{ secrets.MAILTRAP_API_TOKEN }}"
          $json.Mailtrap.FromAddress = "${{ vars.MAILTRAP_FROM_ADDRESS }}"
          $json | ConvertTo-Json -Depth 10 | Set-Content $path

      - name: Restore
        run: dotnet restore ${{ env.WEB_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.WEB_PROJECT }} -c Release --no-restore

      - name: Publish and deploy to shared IIS (MSDeploy)
        shell: pwsh
        env:
          VITE_API_URL: https://beta.rugbyjunction.us
          VITE_API_KEY: ${{ vars['API_KEY'] }}
          VITE_YOUTUBE_API_KEY: ${{ vars['YOUTUBE_API_KEY'] }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VITE_API_KEY)) {
            throw "Missing API_KEY in GitHub beta environment."
          }

          if ([string]::IsNullOrWhiteSpace($env:VITE_YOUTUBE_API_KEY)) {
            throw "Missing YOUTUBE_API_KEY in GitHub Environment variables (beta)."
          }

          dotnet publish "${{ env.WEB_PROJECT }}" `
            -c Release `
            "/p:PublishProfile=${{ env.BETA_PUBLISH_PROFILE }}" `
            /p:EnvironmentName=Beta `
            "/p:UserName=${{ vars.WEBDEPLOY_USERNAME }}" `
            "/p:Password=${{ secrets.WEBDEPLOY_PASSWORD }}" `
            /p:AllowUntrustedCertificate=True `
            --no-build
