name: Enhancement request
description: Request a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What do you want to add or improve?
      placeholder: Describe the feature briefly.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user need or pain point does this address?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What should be included?
      placeholder: Include the minimum set of functionality.
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: What should not be included in this work?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Write these as testable outcomes.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: Testing plan
      description: What tests or validation should Copilot run?
      placeholder: Unit tests, integration tests, manual verification