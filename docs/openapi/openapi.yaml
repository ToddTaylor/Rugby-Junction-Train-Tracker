openapi: 3.0.3
info:
  title: Rugby Junction API
  version: 1.0.0
  description: API reference starter spec for Docusaurus OpenAPI pages.
servers:
  - url: https://api.rugbyjunction.us
paths:
  /health:
    get:
      summary: Health Check
      description: Returns service health status.
      operationId: getHealth
      tags:
        - System
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
